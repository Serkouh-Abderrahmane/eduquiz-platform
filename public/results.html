<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduQuiz - Results</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/game.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%); color: #fff; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .results-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 20px; }
    .results-container { max-width: 600px; width: 100%; }

    /* Loading */
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 60px 0; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #6C63FF; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: rgba(255,255,255,0.6); font-size: 16px; }

    /* Results Content */
    #results-content { animation: fadeInUp 0.6s ease-out; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .results-header { text-align: center; margin-bottom: 32px; }
    .results-trophy { font-size: 80px; margin-bottom: 16px; animation: trophyBounce 1s ease-out; }
    @keyframes trophyBounce { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
    .results-title { font-size: 2rem; font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, #FFD700, #FF6B9D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .results-subtitle { font-size: 1rem; color: rgba(255,255,255,0.7); }

    /* Score Circle */
    .results-score-section { display: flex; justify-content: center; margin-bottom: 28px; }
    .results-score-circle { position: relative; width: 140px; height: 140px; }
    .results-score-circle svg { width: 140px; height: 140px; transform: rotate(-90deg); }
    .results-score-circle circle { fill: none; stroke-width: 8; }
    .results-score-circle circle:first-child { stroke: rgba(255,255,255,0.08); }
    .results-score-circle circle:last-child { stroke-linecap: round; transition: stroke-dashoffset 1.5s ease-out; }
    .score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .score-percent { font-size: 2.5rem; font-weight: 900; }
    .score-label { font-size: 1rem; color: rgba(255,255,255,0.5); }

    /* Stars */
    .results-stars { display: flex; justify-content: center; gap: 12px; margin-bottom: 28px; }
    .results-star { font-size: 40px; opacity: 0; transform: scale(0); transition: all 0.4s ease-out; }
    .results-star.earned { opacity: 1; transform: scale(1); animation: starPop 0.5s ease-out; }
    .results-star.empty { opacity: 0.2; transform: scale(1); }
    @keyframes starPop { 0% { transform: scale(0) rotate(-180deg); } 60% { transform: scale(1.3) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }

    /* Rewards */
    .results-rewards { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
    .reward-item { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 14px 24px; text-align: center; min-width: 120px; }
    .reward-value { font-size: 1.8rem; font-weight: 900; margin-bottom: 4px; }
    .reward-value.xp { color: #FFD700; }
    .reward-value.coins { color: #FF9800; }
    .reward-value.level { color: #6C63FF; }
    .reward-label { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Stats */
    .results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 18px 12px; text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; color: #6C63FF; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Badges */
    .results-badges { text-align: center; margin-bottom: 28px; }
    .results-badges h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; color: #FFD700; }
    .badges-earned { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .badge-earned-item { text-align: center; animation: badgePopIn 0.6s ease-out; }
    .badge-earned-icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .badge-earned-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); }
    @keyframes badgePopIn { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }

    /* Breakdown */
    .results-breakdown { margin-bottom: 32px; }
    .results-breakdown h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; }
    .breakdown-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 8px; border-left: 3px solid; }
    .breakdown-item.correct-breakdown { border-left-color: #4CAF50; }
    .breakdown-item.incorrect-breakdown { border-left-color: #f44336; }
    .breakdown-number { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .correct-breakdown .breakdown-number { background: rgba(76,175,80,0.2); color: #4CAF50; }
    .incorrect-breakdown .breakdown-number { background: rgba(244,67,54,0.2); color: #f44336; }
    .breakdown-text { flex: 1; font-size: 14px; color: rgba(255,255,255,0.8); line-height: 1.4; }
    .breakdown-result { font-size: 18px; flex-shrink: 0; }
    .breakdown-answer { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    /* Actions */
    .results-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 32px; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
    .btn-primary { background: linear-gradient(135deg, #6C63FF, #5A52E0); color: #fff; box-shadow: 0 4px 15px rgba(108,99,255,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }
    .btn-outline { background: transparent; border: 2px solid rgba(255,255,255,0.2); color: #fff; }
    .btn-outline:hover { border-color: #6C63FF; background: rgba(108,99,255,0.1); transform: translateY(-2px); }

    /* Confetti */
    .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; animation: confettiFall linear forwards; z-index: 1000; pointer-events: none; }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* Toast */
    .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; color: #fff; box-shadow: 0 6px 20px rgba(0,0,0,0.15); animation: toastIn 0.3s ease-out; min-width: 250px; }
    .toast-success { background: linear-gradient(135deg, #4CAF50, #388E3C); }
    .toast-error { background: linear-gradient(135deg, #f44336, #d32f2f); }
    .toast-info { background: linear-gradient(135deg, #2196F3, #1976D2); }
    .toast-out { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100px); } }

    @media (max-width: 600px) {
      .results-stats { grid-template-columns: 1fr; }
      .results-trophy { font-size: 60px; }
      .results-title { font-size: 1.5rem; }
      .results-actions { flex-direction: column; }
      .results-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="results-page">
    <div class="results-container" id="results-container">
      <!-- Loading -->
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Loading results...</p>
      </div>

      <!-- Results -->
      <div id="results-content" style="display:none">
        <!-- Header with trophy -->
        <div class="results-header">
          <div class="results-trophy" id="results-trophy">🏆</div>
          <h1 class="results-title" id="results-title">Great Job!</h1>
          <p class="results-subtitle" id="results-subtitle">You completed the quiz!</p>
        </div>

        <!-- Score circle -->
        <div class="results-score-section">
          <div class="results-score-circle">
            <svg viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
              <circle cx="60" cy="60" r="54" fill="none" stroke="#6C63FF" stroke-width="8"
                      stroke-dasharray="339.292" stroke-dashoffset="339.292" id="score-circle"
                      stroke-linecap="round" transform="rotate(-90 60 60)"/>
            </svg>
            <div class="score-text">
              <span class="score-percent" id="score-percent">0</span>
              <span class="score-label">%</span>
            </div>
          </div>
        </div>

        <!-- Stars -->
        <div class="results-stars" id="results-stars"></div>

        <!-- XP and Coins earned -->
        <div class="results-rewards" id="results-rewards"></div>

        <!-- Stats grid -->
        <div class="results-stats" id="results-stats">
          <div class="stat-card">
            <div class="stat-value" id="stat-correct">0/0</div>
            <div class="stat-label">Correct</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-time">0:00</div>
            <div class="stat-label">Time</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-score">0</div>
            <div class="stat-label">Points</div>
          </div>
        </div>

        <!-- Badges earned -->
        <div class="results-badges" id="results-badges" style="display:none">
          <h3>🏅 Badges Earned!</h3>
          <div class="badges-earned" id="badges-earned"></div>
        </div>

        <!-- Question breakdown -->
        <div class="results-breakdown">
          <h3>📋 Question Review</h3>
          <div id="question-breakdown"></div>
        </div>

        <!-- Action buttons -->
        <div class="results-actions">
          <button class="btn btn-primary" onclick="playAgain()">🔄 Play Again</button>
          <button class="btn btn-outline" onclick="goHome()">🏠 Back to Dashboard</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    /* ========== CSP Bypass: convert onclick attrs to addEventListener ========== */
    (function(){function c(r){if(!r.querySelectorAll)return;r.querySelectorAll('[onclick]').forEach(function(e){var h=e.getAttribute('onclick');e.removeAttribute('onclick');e.addEventListener('click',function(ev){new Function('event',h).call(e,ev)})})}var o=new MutationObserver(function(ms){ms.forEach(function(m){m.addedNodes.forEach(function(n){if(n.nodeType===1)c(n)})})});if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){c(document);o.observe(document.body,{childList:true,subtree:true})})}else{c(document);o.observe(document.body,{childList:true,subtree:true})}})();

    /* ========== Toast System ========== */
    const Toast = {
      container: null,
      init() {
        this.container = document.getElementById('toast-container');
      },
      show(message, type = 'info', duration = 3000) {
        if (!this.container) this.init();
        if (!this.container) return;
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        this.container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add('toast-out');
          setTimeout(() => toast.remove(), 300);
        }, duration);
      },
      success(msg) { this.show(msg, 'success'); },
      error(msg) { this.show(msg, 'error'); },
      info(msg) { this.show(msg, 'info'); }
    };

    /* ========== API Stub ========== */
    const API = {
      _getSession() { return JSON.parse(localStorage.getItem('eduquiz_session') || 'null'); },
      _getUsers() { return JSON.parse(localStorage.getItem('eduquiz_users') || '[]'); },
      _setUsers(users) { localStorage.setItem('eduquiz_users', JSON.stringify(users)); },
      _setSession(s) { localStorage.setItem('eduquiz_session', JSON.stringify(s)); },
      _getActivities() { return JSON.parse(localStorage.getItem('eduquiz_activities') || '[]'); },
      isLoggedIn() { return !!this._getSession(); },
      getCurrentUser() { return this._getSession(); },
      async submitScore(activityId, score, totalQuestions, timeTaken) {
        const session = this._getSession();
        if (!session) return null;
        const users = this._getUsers();
        const user = users.find(u => u.id === session.id);
        if (!user) return null;
        if (!user.scores) user.scores = {};
        const prevBest = user.scores[activityId] || 0;
        if (score > prevBest) user.scores[activityId] = score;
        const xpEarned = score * 10;
        const coinsEarned = score;
        user.xp = (user.xp || 0) + xpEarned;
        user.coins = (user.coins || 0) + coinsEarned;
        user.level = Math.floor(user.xp / 500) + 1;
        // Check badges
        const newBadges = [];
        const badgeDefs = [
          { id: 'first_quiz', name: 'First Quiz', icon: '🎯', bg: '#E3F2FD', condition: () => Object.keys(user.scores || {}).length >= 1 },
          { id: 'streak_5', name: '5 Day Streak', icon: '🔥', bg: '#FFF3E0', condition: () => (user.streak || 0) >= 5 },
          { id: 'perfect_score', name: 'Perfect Score', icon: '💯', bg: '#E8F5E9', condition: () => Object.values(user.scores || {}).some(s => s >= 10) },
          { id: 'level_5', name: 'Level 5', icon: '⭐', bg: '#F3E5F5', condition: () => (user.level || 0) >= 5 },
          { id: 'xp_1000', name: 'XP Master', icon: '🧠', bg: '#FCE4EC', condition: () => (user.xp || 0) >= 1000 },
          { id: 'quiz_10', name: 'Quiz Veteran', icon: '🏅', bg: '#E0F7FA', condition: () => Object.keys(user.scores || {}).length >= 10 }
        ];
        if (!user.badges) user.badges = [];
        badgeDefs.forEach(b => {
          if (!user.badges.includes(b.id) && b.condition()) {
            user.badges.push(b.id);
            newBadges.push(b);
          }
        });
        this._setUsers(users);
        this._setSession(user);
        return { xp_earned: xpEarned, coins_earned: coinsEarned, total_xp: user.xp, total_coins: user.coins, level: user.level, badges_earned: newBadges };
      }
    };

    /* ========== Confetti System ========== */
    const Confetti = {
      colors: ['#6C63FF', '#FF6B9D', '#4CAF50', '#FF9800', '#2196F3', '#FFD700', '#E91E63', '#00BCD4'],
      launch(count = 60) {
        for (let i = 0; i < count; i++) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          piece.style.left = Math.random() * 100 + 'vw';
          piece.style.top = '-10px';
          piece.style.backgroundColor = this.colors[Math.floor(Math.random() * this.colors.length)];
          piece.style.width = (Math.random() * 8 + 5) + 'px';
          piece.style.height = (Math.random() * 8 + 5) + 'px';
          piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
          piece.style.animationDelay = (Math.random() * 1.5) + 's';
          document.body.appendChild(piece);
          setTimeout(() => piece.remove(), 5000);
        }
      }
    };

    /* ========== Badge Definitions ========== */
    const BADGE_DEFS = {
      'first_quiz': { name: 'First Quiz', icon: '🎯', bg: '#E3F2FD' },
      'streak_5': { name: '5 Day Streak', icon: '🔥', bg: '#FFF3E0' },
      'perfect_score': { name: 'Perfect Score', icon: '💯', bg: '#E8F5E9' },
      'level_5': { name: 'Level 5', icon: '⭐', bg: '#F3E5F5' },
      'xp_1000': { name: 'XP Master', icon: '🧠', bg: '#FCE4EC' },
      'quiz_10': { name: 'Quiz Veteran', icon: '🏅', bg: '#E0F7FA' }
    };

    /* ========== Render Results ========== */
    function renderResults(results) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('results-content').style.display = 'block';

      const percent = results.totalQuestions > 0 ? Math.round((results.correctCount / results.totalQuestions) * 100) : 0;

      // Title based on performance
      let trophy = '🏆';
      let title = 'Great Job!';
      let subtitle = 'You completed the quiz!';
      if (percent === 100) { trophy = '👑'; title = 'Perfect Score!'; subtitle = 'You got every question right! Amazing!'; }
      else if (percent >= 80) { trophy = '🏆'; title = 'Excellent Work!'; subtitle = 'You really know your stuff!'; }
      else if (percent >= 60) { trophy = '🎉'; title = 'Good Job!'; subtitle = 'Keep practicing to improve!'; }
      else if (percent >= 40) { trophy = '💪'; title = 'Nice Try!'; subtitle = 'Practice makes perfect!'; }
      else { trophy = '📚'; title = 'Keep Learning!'; subtitle = 'Review the material and try again!'; }

      document.getElementById('results-trophy').textContent = trophy;
      document.getElementById('results-title').textContent = title;
      document.getElementById('results-subtitle').textContent = subtitle;

      // Score circle animation
      const circle = document.getElementById('score-circle');
      const circumference = 2 * Math.PI * 54;
      const offset = circumference - (percent / 100) * circumference;
      setTimeout(() => {
        circle.style.stroke = percent >= 80 ? '#4CAF50' : percent >= 60 ? '#FF9800' : '#f44336';
        circle.style.strokeDashoffset = offset;
      }, 300);
      // Animate counter
      animateCounter('score-percent', 0, percent, 1500);

      // Stars
      const starsContainer = document.getElementById('results-stars');
      starsContainer.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const star = document.createElement('span');
        star.className = 'results-star';
        if (i < results.stars) {
          star.textContent = '⭐';
          star.classList.add('earned');
          star.style.animationDelay = (0.3 + i * 0.3) + 's';
        } else {
          star.textContent = '⭐';
          star.classList.add('empty');
        }
        starsContainer.appendChild(star);
      }

      // Rewards
      const rewardsContainer = document.getElementById('results-rewards');
      const xpEarned = results.reward ? results.reward.xp_earned : results.correctCount * 10;
      const coinsEarned = results.reward ? results.reward.coins_earned : results.correctCount;
      const userLevel = results.reward ? results.reward.level : 1;
      rewardsContainer.innerHTML = `
        <div class="reward-item">
          <div class="reward-value xp">+${xpEarned}</div>
          <div class="reward-label">XP Earned</div>
        </div>
        <div class="reward-item">
          <div class="reward-value coins">+${coinsEarned}</div>
          <div class="reward-label">Coins</div>
        </div>
        <div class="reward-item">
          <div class="reward-value level">${userLevel}</div>
          <div class="reward-label">Level</div>
        </div>`;

      // Stats
      document.getElementById('stat-correct').textContent = `${results.correctCount}/${results.totalQuestions}`;
      const mins = Math.floor(results.totalTime / 60);
      const secs = results.totalTime % 60;
      document.getElementById('stat-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      document.getElementById('stat-score').textContent = results.score;

      // Badges
      if (results.reward && results.reward.badges_earned && results.reward.badges_earned.length > 0) {
        const badgesSection = document.getElementById('results-badges');
        badgesSection.style.display = 'block';
        const badgesGrid = document.getElementById('badges-earned');
        badgesGrid.innerHTML = results.reward.badges_earned.map(b => `
          <div class="badge-earned-item">
            <div class="badge-earned-icon" style="background: ${b.bg};">${b.icon}</div>
            <div class="badge-earned-name">${b.name}</div>
          </div>`).join('');
      }

      // Question breakdown
      const breakdownContainer = document.getElementById('question-breakdown');
      if (results.answers && results.answers.length > 0) {
        breakdownContainer.innerHTML = results.answers.map((a, idx) => {
          const isCorrect = a.correct;
          let userAnswerText = '';
          let correctAnswerText = '';
          if (a.question.type === 'multiple_choice') {
            userAnswerText = a.userAnswer !== null && a.userAnswer !== undefined ? a.question.options[a.userAnswer] : 'No answer';
            correctAnswerText = a.question.options[a.question.correct];
          } else if (a.question.type === 'true_false') {
            userAnswerText = a.userAnswer !== null && a.userAnswer !== undefined ? (a.userAnswer ? 'True' : 'False') : 'No answer';
            correctAnswerText = a.question.correct ? 'True' : 'False';
          } else {
            userAnswerText = a.userAnswer || 'No answer';
            correctAnswerText = String(a.question.correct);
          }
          return `
            <div class="breakdown-item ${isCorrect ? 'correct-breakdown' : 'incorrect-breakdown'}">
              <div class="breakdown-number">${idx + 1}</div>
              <div class="breakdown-text">
                ${a.question.text}
                ${!isCorrect ? `<div class="breakdown-answer">Your answer: ${userAnswerText} · Correct: ${correctAnswerText}</div>` : ''}
              </div>
              <div class="breakdown-result">${isCorrect ? '✅' : '❌'}</div>
            </div>`;
        }).join('');
      }

      // Launch confetti for good scores
      if (percent >= 60) {
        setTimeout(() => Confetti.launch(80), 500);
      }
    }

    /* ========== Animate Counter ========== */
    function animateCounter(elementId, start, end, duration) {
      const el = document.getElementById(elementId);
      if (!el) return;
      const startTime = performance.now();
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + (end - start) * eased);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    /* ========== Navigation ========== */
    function playAgain() {
      const results = JSON.parse(localStorage.getItem('eduquiz_last_results') || 'null');
      if (results && results.activityId) {
        window.location.href = `/game.html?id=${results.activityId}`;
      } else {
        window.location.href = '/';
      }
    }

    function goHome() {
      window.location.href = '/';
    }

    /* ========== Init ========== */
    document.addEventListener('DOMContentLoaded', () => {
      Toast.init();

      if (!API.isLoggedIn()) {
        document.getElementById('loading-state').innerHTML = '<p style="color:rgba(255,255,255,0.6);">Please login to view results. <a href="/" style="color:#6C63FF;">Go to home</a></p>';
        return;
      }

      const results = JSON.parse(localStorage.getItem('eduquiz_last_results') || 'null');
      if (!results) {
        document.getElementById('loading-state').innerHTML = '<p style="color:rgba(255,255,255,0.6);">No results found. <a href="/" style="color:#6C63FF;">Go to dashboard</a></p>';
        return;
      }

      // If score hasn't been submitted to API yet, do it now
      if (!results.reward) {
        API.submitScore(results.activityId, results.correctCount, results.totalQuestions, results.totalTime)
          .then(reward => {
            if (reward) {
              results.reward = reward;
              localStorage.setItem('eduquiz_last_results', JSON.stringify(results));
            }
            renderResults(results);
          })
          .catch(() => renderResults(results));
      } else {
        renderResults(results);
      }
    });
  </script>
</body>
</html>
